services:
  postgres:
    image: postgres:16
    container_name: canadian_banking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-canadian_banking}
      POSTGRES_USER: ${POSTGRES_USER:-banking_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banking_admin_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./data/raw:/data/raw:ro
      - ./sql:/sql:ro
      - ./tests:/tests:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
